version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        # CLI output and test response helpers intentionally ignore write errors.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*encoding/json.Encoder).Encode
        - (net/http.ResponseWriter).Write
        # Best-effort cleanup paths; substantive close failures are checked inline.
        - (io.ReadCloser).Close
        - (io.WriteCloser).Close
        - (*os.File).Close
