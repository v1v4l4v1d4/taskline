name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [server, cli]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: |
            server/go.sum
            cli/go.sum
      - name: Prepare embedded web dist
        run: |
          mkdir -p server/web/dist
          printf '<!doctype html><html><body></body></html>' > server/web/dist/index.html
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}
          args: --config ../.golangci.yml ./...

  go-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [server, cli]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: |
            server/go.sum
            cli/go.sum
      - name: Prepare embedded web dist
        run: |
          mkdir -p server/web/dist
          printf '<!doctype html><html><body></body></html>' > server/web/dist/index.html
      - name: Run Go tests
        working-directory: ${{ matrix.module }}
        run: go test ./... -count=1

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
          package_json_file: web/package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
